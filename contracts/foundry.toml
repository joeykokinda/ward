[profile.default]
src = "src"
out = "out"
libs = ["lib"]
solc = "0.8.24"
evm_version = "cancun"
optimizer = true
optimizer_runs = 200
# Canonical deployments dir is the repo root /deployments (read by the agent +
# frontend); scripts write/read there via ../deployments.
fs_permissions = [{access = "read-write", path = "../deployments"}]
remappings = [
    "@openzeppelin/contracts/=lib/openzeppelin-contracts/contracts/",
    "forge-std/=lib/forge-std/src/",
]

# block-timestamp: intentional and load-bearing (job deadlines + attestation
#   freshness windows must key off chain time).
# unsafe-typecast: only in tests/scripts, all bytes32("...") fixed-literal IDs and
#   the uint32 index in vm.deriveKey; provably safe, never in production src/.
[lint]
exclude_lints = ["block-timestamp", "unsafe-typecast"]

[fmt]
line_length = 120
tab_width = 4
bracket_spacing = false
int_types = "long"

# See more config options https://github.com/foundry-rs/foundry/blob/master/crates/config/README.md#all-options
