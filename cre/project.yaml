# ==========================================================================
# WARD — CRE PROJECT SETTINGS
# ==========================================================================
# Project root for the WARD attestation workflow. `cre workflow simulate
# ./workflow --target <section>` resolves RPCs from the matching settings
# section below. Arc Testnet is a CRE-supported network (min: CLI v1.0.7+,
# TS SDK v1.3.1+) with a live mock Forwarder; see README.md.
#
# Arc Testnet (chain id 5042002) chain name `arc-testnet`, numeric
# chain-selector 3034092155422581607 per `cre workflow supported-chains`.
# Public Arc Testnet RPC: https://rpc.testnet.arc.network.
# ==========================================================================

local-simulation-settings:
  rpcs:
    - chain-name: arc-testnet
      url: https://rpc.testnet.arc.network

staging-settings:
  rpcs:
    - chain-name: arc-testnet
      url: https://rpc.testnet.arc.network

production-settings:
  account:
    # Workflow owner wallet/MSIG. Required for deploy; not required for simulate.
    workflow-owner-address: "<YOUR_WORKFLOW_OWNER_ADDRESS>"
  rpcs:
    - chain-name: arc-testnet
      url: https://rpc.testnet.arc.network
