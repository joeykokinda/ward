# CRE workflow settings (per-target). Mirrors cre-sdk-typescript example layout.
# `local-simulation` is the target used by `cre workflow simulate`.
local-simulation:
  user-workflow:
    workflow-name: "ward-attest"
  workflow-artifacts:
    workflow-path: "./index.ts"
    config-path: "./config.json"

# Used by `cre workflow deploy --target production-testnet` once you have a
# logged-in CRE account + a funded workflow owner. workflow-owner-address is the
# wallet/MSIG that owns the workflow and whose key encrypts secrets.
production-testnet:
  user-workflow:
    workflow-owner-address: "<YOUR_WORKFLOW_OWNER_ADDRESS>"
    workflow-name: "ward-attest"
  workflow-artifacts:
    workflow-path: "./index.ts"
    config-path: "./config.json"
